name: Build Serverless Images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-worker:
    name: GPU Worker (chatterbox-tts)
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /usr/share/swift \
                      /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          docker system prune -af || true

      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: worker/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/voicebox-worker:latest

  build-cpu:
    name: CPU Server (FastAPI)
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /usr/share/swift \
                      /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          docker system prune -af || true

      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.cpu
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/voicebox-cpu:latest
